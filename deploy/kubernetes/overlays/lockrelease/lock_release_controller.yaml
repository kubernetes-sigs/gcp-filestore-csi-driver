apiVersion: apps/v1
kind: Deployment
metadata:
  name: filestore-lock-release-controller
  namespace: gcp-filestore-csi-driver
  labels:
    k8s-app: filestore-lock-release-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: filestore-lock-release-controller
  template:
    metadata:
      labels:
        k8s-app: filestore-lock-release-controller
        component: filestorecsi
    spec:
      priorityClassName: csi-gcp-fs-node
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: filestore-lock-release-controller
        image: 'gcr.io/shensiyan-joonix/gcp-filestore-csi-driver-lockrelease:18'
        args:
        - --v=6
        resources:                                               
          requests:                                              
            cpu: 5m                                              
            memory: 10Mi                                         
      serviceAccountName: gcp-filestore-csi-node-sa    # To be created in fscsi_lock_release_rbac.yaml
      tolerations:
      - key: "kubernetes.io/arch"
        operator: "Equal"
        value: "arm64"
        effect: "NoSchedule"
